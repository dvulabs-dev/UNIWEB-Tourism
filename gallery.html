<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Lanka Explore</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">Lanka Explore</div>
        <nav><ul><li><a href="index.html">Home</a></li><li><a href="gallery.html" class="active">Gallery</a></li></ul></nav>
    </header>
    <main>
        <section class="inner-header" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/eb/SL_Kandy_asv2020-01_img33_Sacred_Tooth_Temple.jpg');">
            <h1>Photo Gallery</h1>
        </section>
        <section class="container">
            <div class="section-title">
                <h2>Moments from Sri Lanka</h2>
                <p>A glimpse into the stunning landscapes and vibrant culture.</p>
            </div>
            <div class="grid-3" style="gap: 1rem;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e6/Sigiriya_%28141688197%29.jpeg" alt="Sigiriya Rock Fortress" style="width:100%; border-radius:10px; cursor:pointer; transition:transform 0.3s; aspect-ratio: 1/1; object-fit: cover;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c6/NuwaraEliya_from_top.jpg" alt="Nuwara Eliya Highlands" style="width:100%; border-radius:10px; cursor:pointer; transition:transform 0.3s; aspect-ratio: 1/1; object-fit: cover;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/77/Galle_Fort.jpg" alt="Galle Fort Streets" style="width:100%; border-radius:10px; cursor:pointer; transition:transform 0.3s; aspect-ratio: 1/1; object-fit: cover;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/eb/SL_Kandy_asv2020-01_img33_Sacred_Tooth_Temple.jpg" alt="Kandy Temple of the Tooth" style="width:100%; border-radius:10px; cursor:pointer; transition:transform 0.3s; aspect-ratio: 1/1; object-fit: cover;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <img src="https://images.unsplash.com/photo-1586227740560-8cf2732c1531?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Mirissa Golden Beach" style="width:100%; border-radius:10px; cursor:pointer; transition:transform 0.3s; aspect-ratio: 1/1; object-fit: cover;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <img src="assert/srilanka_wildlife.png" alt="Yala National Park Safari" style="width:100%; border-radius:10px; cursor:pointer; transition:transform 0.3s; aspect-ratio: 1/1; object-fit: cover;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            </div>
        </section>
    </main>
