<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Lanka Explore</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo">Lanka Explore</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="destinations.html">Destinations</a></li>
                <li><a href="tours.html">Tours</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="booking.html">Booking</a></li>
            </ul>
        </nav>
        <div class="search-icon"><i class="fas fa-search"></i></div>
    </header>

    <main>
        <section class="inner-header" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e6/Sigiriya_%28141688197%29.jpeg');">
            <h1>Contact Us</h1>
        </section>

        <section class="container">
            <div class="form-container">
                <h2 style="text-align:center; margin-bottom: 2rem;">Get In Touch</h2>
                <form>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea placeholder="How can we help you?" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content" style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:2rem; margin-bottom:2rem; padding:0 5%;">
            <div class="footer-brand" style="max-width:300px;">
                <span class="logo" style="color:white; font-size:1.5rem; font-weight:bold;">Lanka Explore</span>
                <p style="color:#aaa; margin-top:1rem;">Your gateway to the wonders of Sri Lanka.</p>
            </div>
            <div class="footer-col">
                <h4 style="color:white; margin-bottom:1rem;">Explore</h4>
                <ul style="list-style:none; padding:0; line-height:2;">
                    <li><a href="destinations.html" style="color:#aaa; text-decoration:none;">Destinations</a></li>
                    <li><a href="tours.html" style="color:#aaa; text-decoration:none;">Tours</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom" style="display:flex; justify-content:space-between; border-top:1px solid rgba(255,255,255,0.1); padding:1rem 5% 0; color:#aaa; font-size:0.9rem;">
            <div class="footer-contact">Contact: +94 77 123 4567</div>
            <div class="footer-credits">&copy; 2026 Lanka Explore. All rights reserved.</div>
        </div>
    </footer>
</body>
</html>
